# .claude/config.toml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MCP server configuration for agent-scaffold projects.
#
# To activate a server: uncomment its block and fill in credentials.
# Run `claude mcp list` to verify active servers.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ─── CORE: Codex CLI as review agent ─────────────────────────────
# The backbone of the review pipeline. Gives Claude access to a
# second LLM (GPT o3) for independent code and spec review.
#
# Setup:
#   npm install -g codex-as-mcp  (or use npx, no install needed)
#   Set your OpenAI API key below or in OPENAI_API_KEY env var
#
[mcp_servers.codex]
transport = "stdio"
command = "npx"
args = ["codex-as-mcp@latest"]
tool_timeout_sec = 600
# env = { PROVIDER_API_KEY = "sk-..." }

# ─── BROWSER: Playwright (browser automation) ────────────────────
# Full browser control — navigate, click, fill forms, screenshot.
# Essential for: E2E testing, scraping, visual validation.
#
# [mcp_servers.playwright]
# transport = "stdio"
# command = "npx"
# args = ["@anthropic-ai/mcp-server-playwright"]

# ─── DOCS: Context7 (live library documentation) ─────────────────
# Pulls current docs for any npm/PyPI library into agent context.
# Prevents hallucinated APIs and outdated usage patterns.
# No API key needed — free and open.
#
[mcp_servers.context7]
transport = "stdio"
command = "npx"
args = ["@context7/mcp-server"]

# ─── DATA: PostgreSQL ────────────────────────────────────────────
#
# [mcp_servers.postgres]
# transport = "stdio"
# command = "npx"
# args = ["@anthropic-ai/mcp-server-postgres", "postgresql://user:pass@localhost:5432/db"]

