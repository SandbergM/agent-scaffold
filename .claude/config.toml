# .claude/config.toml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MCP server configuration.
# Run `claude mcp list` to verify active servers.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ─── CORE: Codex CLI (native MCP server) ─────────────────────────
# Independent code review, spec review, second opinion.
# Prereq: npm install -g @openai/codex
# Auth: logged in via `codex` or OPENAI_API_KEY env var
#
[mcp_servers.codex]
command = "codex"
args = ["mcp-server"]

# ─── DOCS: Context7 (live library documentation) ─────────────────
# Pulls current docs for any library into agent context.
# No API key needed. 9000+ libraries.
# Usage: add "use context7" to your prompt.
#
[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

